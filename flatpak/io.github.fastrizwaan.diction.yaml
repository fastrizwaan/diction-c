app-id: io.github.fastrizwaan.diction
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: diction
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --share=network
  - --filesystem=host
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=io.github.fastrizwaan.diction
modules:
  - name: diction
    buildsystem: meson
    sources:
      - type: dir
        path: ..
